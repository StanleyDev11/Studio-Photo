services:
  db:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-STANLEY}
      MYSQL_DATABASE: photo_db
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - photo-network
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: .
    container_name: photo-app
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/photo_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-STANLEY}
      STORAGE_LOCATION: /app/uploads
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      FEDAPAY_PUBLIC_KEY: ${FEDAPAY_PUBLIC_KEY}
      FEDAPAY_SECRET_KEY: ${FEDAPAY_SECRET_KEY}
      BACKEND_BASE_URL: https://${DOMAIN_NAME:-localhost}
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - photo-network

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME:-localhost}
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    networks:
      - photo-network

networks:
  photo-network:
    driver: bridge

volumes:
  mysql_data:
